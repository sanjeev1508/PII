entities:
  - type: PERSON
    enabled: true
    confidence_threshold: 0.80
    mask_template: "[PERSON-{id}]"

  - type: EMAIL_ADDRESS
    enabled: true
    confidence_threshold: 0.95
    mask_template: "user_{id}@redacted.com"

  - type: PHONE_NUMBER
    enabled: true
    confidence_threshold: 0.90
    mask_template: "[PHONE-{id}]"

  - type: CREDIT_CARD
    enabled: true
    confidence_threshold: 0.95
    validate_luhn: true
    mask_template: "[CARD-XXXX-{id}]"

  - type: US_SSN
    enabled: true
    confidence_threshold: 0.95
    mask_template: "[SSN-{id}]"

  - type: FINANCIAL_AMOUNT
    enabled: true
    confidence_threshold: 0.80
    min_digits: 1
    mask_template: "$[AMOUNT-{id}]"

  - type: PARTY_NAME
    enabled: true
    confidence_threshold: 0.75
    max_token_length: 10
    mask_template: "[ENTITY-{id}]"

  - type: ADDRESS
    enabled: true
    confidence_threshold: 0.75
    validate_format: true
    mask_template: "[ADDRESS-{id}]"

  - type: JURISDICTION
    enabled: true
    confidence_threshold: 0.75
    max_token_length: 20
    mask_template: "[JURISDICTION-{id}]"

llm_review:
  enabled: true
  min_confidence: 0.50
  model: "gpt-4.1-mini"
  fail_open_on_error: true
  # Number of candidates per direct OpenAI batch request
  batch_size: 50
  # Local skill profile and confidence reference file consumed by the LLM
  skills_file: "SKILLS.md"
  reference_file: "outputs/llm/reference_scores.json"
  # Optional: review only these ambiguous types (empty list = all types)
  review_entity_types: ["PARTY_NAME", "ADDRESS", "JURISDICTION"]
  # Safety/performance cap for LLM reviews per document
  max_reviews_per_document: 250

orchestration:
  # If detector confidence is above this value, mask directly without LLM.
  direct_spacy_confidence: 0.90

qdrant:
  enabled: true
  # Local Docker Qdrant endpoint
  url: "http://localhost:6333"
  collection: "unreported_candidates"
  # Threshold supports 50 (percent) or 0.5 (normalized)
  min_confidence_percent: 50
  # Async OpenAI agent settings for payload acceptance
  agent_model: "gpt-4.1-mini"
  agent_batch_size: 40
  skills_file: "SKILLS.md"
  reference_file: "outputs/llm/reference_scores.json"
  timeout_seconds: 8
  vector_dim: 12
