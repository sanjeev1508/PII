entities:
  - type: PERSON
    enabled: true
    confidence_threshold: 0.75
    mask_template: "[PERSON-{id}]"

  - type: EMAIL_ADDRESS
    enabled: true
    confidence_threshold: 0.80
    mask_template: "user_{id}@redacted.com"

  - type: PHONE_NUMBER
    enabled: true
    confidence_threshold: 0.60   # lowered — regex gives 0.90-0.95, spaCy may give 0.60-0.75
    mask_template: "[PHONE-{id}]"

  - type: CREDIT_CARD
    enabled: true
    confidence_threshold: 0.80
    validate_luhn: true
    mask_template: "[CARD-XXXX-{id}]"

  - type: US_SSN
    enabled: true
    confidence_threshold: 0.80
    mask_template: "[SSN-{id}]"

  - type: FINANCIAL_AMOUNT
    enabled: false
    confidence_threshold: 0.80
    min_digits: 1
    mask_template: "$[AMOUNT-{id}]"

  - type: PARTY_NAME
    enabled: true
    confidence_threshold: 0.75
    max_token_length: 10
    mask_template: "[ENTITY-{id}]"

  - type: ADDRESS
    enabled: true
    confidence_threshold: 0.70
    validate_format: true
    mask_template: "[ADDRESS-{id}]"

  - type: JURISDICTION
    enabled: true
    confidence_threshold: 0.75
    max_token_length: 20
    mask_template: "[JURISDICTION-{id}]"

  - type: DATE_TIME
    enabled: true
    confidence_threshold: 0.85
    mask_template: "[DATE-{id}]"

  - type: IP_ADDRESS
    enabled: true
    confidence_threshold: 0.80
    mask_template: "[IP-{id}]"

  - type: US_PASSPORT
    enabled: true
    confidence_threshold: 0.75
    mask_template: "[PASSPORT-{id}]"

  - type: US_DRIVER_LICENSE
    enabled: true
    confidence_threshold: 0.75
    mask_template: "[DL-{id}]"

llm_review:
  enabled: true
  min_confidence: 0.50        # higher floor = fewer LLM calls
  model: "gpt-4.1-mini"
  fail_open_on_error: true
  batch_size: 80              # larger batches = fewer API round-trips
  skills_file: "SKILLS.md"
  reference_file: "outputs/llm/reference_scores.json"
  review_entity_types: ["PARTY_NAME", "ADDRESS", "JURISDICTION"]
  max_reviews_per_document: 50  # cap to keep latency bounded

  # Direct mask without LLM above this confidence (lower = fewer LLM calls = faster)
  direct_spacy_confidence: 0.70

qdrant:
  enabled: true
  url: "http://localhost:6333"
  collection: "unreported_candidates"
  min_confidence_percent: 40    # higher = fewer candidates stored/reviewed
  agent_model: "gpt-4.1-mini"
  agent_batch_size: 80
  skills_file: "SKILLS.md"
  reference_file: "outputs/llm/reference_scores.json"
  timeout_seconds: 5            # cut from 8s — fail fast
  vector_dim: 12
