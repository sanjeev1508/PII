pipeline:
  mode: redact
  workers: 4
  timeout_seconds: 180
  retry_count: 1

extraction:
  ocr_scale: 1
  native_text_min_words: 30
  use_ocr_fallback: true

detection:
  entity_types:
    - EMAIL
    - PHONE
    - SSN
    - CREDIT_CARD
    - ADDRESS
    - PARTY_NAME
    - JURISDICTION
    - PENALTY_AMOUNT

output:
  pdf_dir: outputs/pdfs
  report_dir: outputs/reports
  log_dir: outputs/logs

